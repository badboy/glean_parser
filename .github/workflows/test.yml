name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

# Drop all default GITHUB_TOKEN permissions; each job declares its own least-privilege set.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            os: ubuntu-latest
          - python-version: "3.9"
            os: ubuntu-latest
            minimum-versions: true
          - python-version: "3.10"
            os: ubuntu-latest
          - python-version: "3.11"
            os: ubuntu-latest
          - python-version: "3.12"
            os: ubuntu-latest
          - python-version: "3.13"
            os: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          filter: blob:none
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install glean_parser
        if: matrix.minimum-versions != true
        run: CC=broken_compiler uv sync

      - name: Install minimum requirements
        if: matrix.minimum-versions == true
        run: |
          uv sync --resolution lowest-direct

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
            ruby-version: '3.4'

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Kotlin linters
        run: make install-kotlin-linters

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: false

      - name: Python tests
        run: |
          make test-full

      - name: Build docs
        if: matrix.python-version == '3.12'
        run: |
          make docs

  lint:
    runs-on: ubuntu-latest
    steps:
      - *checkout

      - name: Set up Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Lint
        run: make lint

  license-check:
    runs-on: ubuntu-latest
    steps:
      - *checkout

      - name: Set up Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: License check
        run: |
          uv run pip-licenses --fail-on 'GNU General Public License v3 (GPLv3)' --ignore-packages yamllint

  code-security-analysis:
    permissions:
      contents: read
      actions: read
    uses: mozilla/ssdlc-actions/.github/workflows/code-security-analysis-private-repo.yml@ca8be48f3c06204fb16a3bd5ffa6d916782bbc76 # v1

  report-result:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    needs:
      - test-python
      - lint
      - license-check
      - code-security-analysis
    steps:
      - name: Determine result
        run: |
          echo "$RESULTS" | grep -v failure
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
